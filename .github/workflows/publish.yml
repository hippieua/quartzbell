name: publish articles

# A merged proposal is not yet an article. This turns it into one:
#   articles/incoming/<name>-<tester>.json   (id: 0, "unassigned")
#     -> articles/<id>.json                  (id assigned here, and only here)
#     -> articles/index.json                 (rebuilt from what is actually on disk)
#
# The id is assigned at MERGE, never by a device: two testers proposing the same
# morning can then never claim the same number (docs/public_repo.md §8).
#
# The result is written back through the CONTENTS API, not `git push`: pushing from
# the runner is refused by this repo ("remote: fatal error in commit_refs"), and the
# API path is the one that demonstrably works. It also means the commits are created
# server-side and carry GitHub's own signature. Commits made with GITHUB_TOKEN do not
# re-trigger workflows, so this cannot loop on itself.

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
  workflow_dispatch: {} # publish what is already sitting in incoming/ (first run, repairs)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Assign ids and rebuild the index
        run: |
          python3 - <<'PY'
          import base64, json, pathlib, re, subprocess, sys

          ART = pathlib.Path("articles")
          INC = ART / "incoming"
          ART.mkdir(exist_ok=True)

          def load(p):
              with p.open(encoding="utf-8") as f:
                  return json.load(f)

          # Published articles are articles/<id>.json — nothing else in that directory is
          # one. index.json is rebuilt from them, so it can never drift from the truth on
          # disk (a hand-edited index is a lie waiting to be fetched by a tester).
          published = {}
          for p in ART.glob("*.json"):
              if p.name == "index.json":
                  continue
              if not re.fullmatch(r"\d+", p.stem):
                  print(f"::warning::{p} is not <id>.json - ignored")
                  continue
              published[int(p.stem)] = load(p)

          next_id = (max(published) + 1) if published else 1
          plan = []  # (action, path, content|None)

          for p in sorted(INC.glob("*.json")) if INC.is_dir() else []:
              art = load(p)

              # A proposal must not carry an id: the device sends 0. Anything else means
              # someone hand-edited it, and silently trusting that number is how two
              # articles end up fighting over one id.
              if int(art.get("id", 0)) != 0:
                  print(f"::error::{p} arrived with id={art['id']} - proposals must have id 0")
                  sys.exit(1)

              # A name identifies a cable to a human, so it must mean exactly one cable.
              # The device refuses a name another tester already used; this repeats the
              # rule where an old firmware CANNOT bypass it.
              name = art.get("name", "")
              clash = [i for i, a in published.items() if a.get("name") == name]
              if clash:
                  print(f"::error::{p}: the name '{name}' is already article {clash[0]}")
                  sys.exit(1)

              art["id"] = next_id
              body = json.dumps(art, ensure_ascii=False, indent=2) + "\n"
              plan.append(("put", f"articles/{next_id}.json", body))
              plan.append(("del", str(p).replace("\\", "/"), None))
              published[next_id] = art
              print(f"publishing {p.name} -> {next_id}.json ('{name}')")
              next_id += 1

          index = {
              "version": 1,
              "articles": [
                  {
                      "id": i,
                      "name": published[i].get("name", ""),
                      "rev": published[i].get("rev", 1),
                      "file": f"{i}.json",
                  }
                  for i in sorted(published)
              ],
          }
          index_body = json.dumps(index, ensure_ascii=False, indent=2) + "\n"

          old_index = ART / "index.json"
          if (not old_index.is_file()) or (old_index.read_text(encoding="utf-8") != index_body):
              plan.append(("put", "articles/index.json", index_body))

          if not plan:
              print("nothing to publish")

          pathlib.Path("plan.json").write_text(
              json.dumps([
                  {"action": a, "path": p, "content": (base64.b64encode(c.encode()).decode() if c else None)}
                  for a, p, c in plan
              ]),
              encoding="utf-8",
          )
          PY

      - name: Commit through the API
        run: |
          python3 - <<'PY'
          import json, os, pathlib, subprocess

          repo = os.environ["REPO"]
          plan = json.loads(pathlib.Path("plan.json").read_text(encoding="utf-8"))

          def gh(*args):
              return subprocess.run(["gh", *args], capture_output=True, text=True)

          def sha_of(path):
              r = gh("api", f"repos/{repo}/contents/{path}", "--jq", ".sha")
              return r.stdout.strip() if r.returncode == 0 else ""

          for step in plan:
              path, action = step["path"], step["action"]
              sha = sha_of(path)
              if action == "put":
                  args = ["api", "-X", "PUT", f"repos/{repo}/contents/{path}",
                          "-f", f"message=articles: publish {path}",
                          "-f", f"content={step['content']}"]
                  if sha:
                      args += ["-f", f"sha={sha}"]
              else:
                  if not sha:
                      continue  # already gone
                  args = ["api", "-X", "DELETE", f"repos/{repo}/contents/{path}",
                          "-f", f"message=articles: {path} is published",
                          "-f", f"sha={sha}"]
              r = gh(*args)
              if r.returncode != 0:
                  print(f"::error::{action} {path}: {r.stderr.strip()}")
                  raise SystemExit(1)
              print(f"{action} {path}: ok")
          PY
